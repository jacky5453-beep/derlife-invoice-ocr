<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>發票辨識系統 - 得來素</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --brand-green: #C3F000;
            --brand-orange: #FFAA00;
            --brand-dark: #1A1A16;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; }
        .brand-header { background: var(--brand-dark); }
        .brand-btn { background: var(--brand-green); color: var(--brand-dark); font-weight: 700; }
        .brand-btn:hover { background: #b0d800; }
        .brand-btn-orange { background: var(--brand-orange); color: var(--brand-dark); font-weight: 700; }
        .brand-btn-orange:hover { background: #e69900; }
        .upload-zone {
            border: 3px dashed #ccc;
            transition: all 0.3s;
        }
        .upload-zone.dragover {
            border-color: var(--brand-green);
            background: rgba(195, 240, 0, 0.05);
        }
        .invoice-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-pending { background: #fef3c7; color: #92400e; }
        .status-processing { background: #dbeafe; color: #1e40af; }
        .status-done { background: #d1fae5; color: #065f46; }
        .status-error { background: #fee2e2; color: #991b1b; }
        .spinner {
            border: 3px solid #e5e7eb;
            border-top: 3px solid var(--brand-green);
            border-radius: 50%;
            width: 20px; height: 20px;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        input[type="text"], input[type="number"], select {
            border: 1px solid #d1d5db;
            border-radius: 6px;
            padding: 6px 10px;
            font-size: 14px;
            width: 100%;
        }
        input:focus, select:focus { outline: none; border-color: var(--brand-green); box-shadow: 0 0 0 2px rgba(195,240,0,0.2); }
        .tab-btn { padding: 8px 20px; border-radius: 8px 8px 0 0; font-weight: 600; cursor: pointer; }
        .tab-btn.active { background: white; color: var(--brand-dark); }
        .tab-btn:not(.active) { background: rgba(255,255,255,0.2); color: rgba(255,255,255,0.7); }
        /* 表格樣式 */
        .result-table { width: 100%; border-collapse: collapse; }
        .result-table th { background: var(--brand-dark); color: var(--brand-green); padding: 10px 8px; font-size: 13px; text-align: left; }
        .result-table td { padding: 8px; border-bottom: 1px solid #e5e7eb; font-size: 14px; }
        .result-table tr:hover { background: #f9fafb; }
        /* 管理面板 */
        .admin-section { background: #fffbeb; border: 1px solid #fbbf24; border-radius: 8px; padding: 16px; }
    </style>
</head>
<body>
    <!-- ===== 登入畫面 ===== -->
    <div id="loginScreen" class="min-h-screen flex items-center justify-center">
        <div class="text-center bg-white rounded-2xl shadow-lg p-10 max-w-md w-full mx-4">
            <img src="logo.png" alt="得來素" class="h-16 mx-auto mb-6" onerror="this.style.display='none'">
            <h1 class="text-2xl font-bold mb-2" style="color: var(--brand-dark)">發票辨識系統</h1>
            <p class="text-gray-500 mb-8">拍照上傳，AI 自動辨識，一鍵匯出 ERP 格式</p>
            <button onclick="googleLogin()" class="brand-btn px-8 py-3 rounded-lg text-lg w-full flex items-center justify-center gap-3">
                <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                使用 Google 帳號登入
            </button>
            <div id="loginError" class="mt-4 text-red-500 text-sm hidden"></div>
        </div>
    </div>

    <!-- ===== 主畫面 ===== -->
    <div id="mainScreen" class="hidden">
        <!-- Header -->
        <header class="brand-header text-white px-6 py-3 flex items-center justify-between sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <img src="logo.png" alt="得來素" class="h-8" onerror="this.style.display='none'">
                <h1 class="text-lg font-bold" style="color: var(--brand-green)">發票辨識系統</h1>
            </div>
            <div class="flex items-center gap-4">
                <!-- 分頁按鈕 -->
                <div class="flex gap-1">
                    <button onclick="switchTab('upload')" id="tabUpload" class="tab-btn active text-sm">上傳辨識</button>
                    <button onclick="switchTab('history')" id="tabHistory" class="tab-btn text-sm">辨識紀錄</button>
                    <button onclick="switchTab('admin')" id="tabAdmin" class="tab-btn text-sm hidden">管理設定</button>
                </div>
                <div class="flex items-center gap-2 text-sm">
                    <span id="userEmail" class="text-gray-300"></span>
                    <button onclick="logout()" class="text-gray-400 hover:text-white text-xs border border-gray-600 px-2 py-1 rounded">登出</button>
                </div>
            </div>
        </header>

        <main class="max-w-6xl mx-auto p-6">
            <!-- ===== 上傳辨識頁 ===== -->
            <div id="pageUpload">
                <!-- 上傳欄位區域 -->
                <div id="uploadSlotsContainer" class="space-y-3 mb-4">
                    <div class="upload-slot invoice-card p-4 flex items-center gap-4" data-slot="0">
                        <div class="upload-zone rounded-lg p-6 text-center cursor-pointer flex-1" onclick="this.querySelector('input').click()">
                            <input type="file" accept="image/*" class="hidden" onchange="handleSlotFile(this, 0)">
                            <div id="slotPreview_0" class="text-3xl">📸</div>
                            <p class="text-sm text-gray-500 mt-1">點擊上傳發票照片</p>
                        </div>
                        <button onclick="removeSlot(0)" class="text-gray-400 hover:text-red-500 text-xl" title="移除">&times;</button>
                    </div>
                </div>
                <div class="flex gap-3 mb-6">
                    <button onclick="addUploadSlot()" class="bg-gray-200 text-gray-700 px-4 py-2 rounded-lg font-semibold hover:bg-gray-300 text-sm">
                        + 新增上傳欄位
                    </button>
                </div>

                <!-- 操作按鈕 -->
                <div id="actionBar" class="flex gap-3 mb-6 flex-wrap">
                    <button onclick="recognizeAll()" id="btnRecognize" class="brand-btn px-6 py-3 rounded-lg flex items-center gap-2">
                        🤖 開始辨識全部
                    </button>
                    <button onclick="clearAllSlots()" class="bg-gray-200 text-gray-700 px-6 py-3 rounded-lg font-semibold hover:bg-gray-300">
                        清除全部
                    </button>
                </div>

                <!-- 辨識結果表格 -->
                <div id="resultSection" class="hidden">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-xl font-bold" style="color: var(--brand-dark)">辨識結果</h2>
                        <div class="flex gap-3">
                            <button onclick="addEmptyRow()" class="bg-gray-200 text-gray-700 px-4 py-2 rounded-lg font-semibold hover:bg-gray-300 text-sm">
                                + 手動新增一行
                            </button>
                            <button onclick="exportXLS()" class="brand-btn-orange px-6 py-2 rounded-lg flex items-center gap-2">
                                📥 匯出 XLS
                            </button>
                        </div>
                    </div>
                    <div class="bg-white rounded-xl shadow overflow-x-auto">
                        <table class="result-table" id="resultTable">
                            <thead>
                                <tr>
                                    <th style="width:30px"><input type="checkbox" id="checkAll" onchange="toggleCheckAll(this)"></th>
                                    <th>科目分類</th>
                                    <th>憑證類別</th>
                                    <th>發票日期</th>
                                    <th>進項金額</th>
                                    <th>進項稅額</th>
                                    <th>進項總額</th>
                                    <th>發票號碼</th>
                                    <th>銷售方統編</th>
                                    <th style="width:60px">操作</th>
                                </tr>
                            </thead>
                            <tbody id="resultBody"></tbody>
                        </table>
                    </div>
                    <p class="text-xs text-gray-400 mt-2">* 所有欄位皆可手動編輯修正，確認無誤後再匯出</p>
                </div>
            </div>

            <!-- ===== 辨識紀錄頁 ===== -->
            <div id="pageHistory" class="hidden">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-xl font-bold" style="color: var(--brand-dark)">辨識紀錄</h2>
                    <button onclick="clearHistory()" class="text-sm text-red-500 hover:text-red-700">清除全部紀錄</button>
                </div>
                <div id="historyList" class="space-y-3">
                    <p class="text-gray-400 text-center py-10">尚無辨識紀錄</p>
                </div>
            </div>

            <!-- ===== 管理設定頁 ===== -->
            <div id="pageAdmin" class="hidden">
                <h2 class="text-xl font-bold mb-4" style="color: var(--brand-dark)">管理設定</h2>

                <!-- API Key 設定 -->
                <div class="admin-section mb-6">
                    <h3 class="font-bold mb-3">🔑 Anthropic API Key</h3>
                    <div class="flex gap-3">
                        <input type="text" id="apiKeyInput" placeholder="sk-ant-api03-..." class="flex-1">
                        <button onclick="saveApiKey()" class="brand-btn px-4 py-2 rounded-lg text-sm">儲存</button>
                    </div>
                    <p id="apiKeyStatus" class="text-xs text-gray-500 mt-2"></p>
                </div>

                <!-- 白名單管理 -->
                <div class="admin-section mb-6">
                    <h3 class="font-bold mb-3">👥 登入白名單</h3>
                    <div class="flex gap-3 mb-3">
                        <input type="text" id="whitelistInput" placeholder="新增 Email（例如 user@gmail.com）">
                        <button onclick="addWhitelist()" class="brand-btn px-4 py-2 rounded-lg text-sm">新增</button>
                    </div>
                    <div id="whitelistList" class="space-y-2"></div>
                </div>

                <!-- 管理員設定 -->
                <div class="admin-section">
                    <h3 class="font-bold mb-3">⚙️ 管理員名單</h3>
                    <div class="flex gap-3 mb-3">
                        <input type="text" id="adminInput" placeholder="新增管理員 Email">
                        <button onclick="addAdmin()" class="brand-btn px-4 py-2 rounded-lg text-sm">新增</button>
                    </div>
                    <div id="adminList" class="space-y-2"></div>
                </div>
            </div>
        </main>
    </div>

<script>
// ===== Firebase 設定 =====
const firebaseConfig = {
    apiKey: "AIzaSyCMnHuSPNX8kJC53eYgWHXUV4BQjXhM7uo",
    authDomain: "derlife-audit.firebaseapp.com",
    projectId: "derlife-audit",
    storageBucket: "derlife-audit.firebasestorage.app",
    messagingSenderId: "992417419976",
    appId: "1:992417419976:web:8b44d06620ca2e8cd5cbfd"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ===== 全域狀態 =====
let currentUser = null;
let isAdmin = false;
let anthropicApiKey = '';
let uploadSlots = [{ id: 0, dataUrl: null, name: '', status: 'empty' }];  // 上傳欄位
let slotCounter = 1;    // 欄位計數器
let resultRows = [];    // 辨識結果
let historyData = [];   // 歷史紀錄（localStorage）
let categoryOptions = ['進貨', '費用', '固定資產', '其他'];  // 科目分類選項
let certTypeOptions = ['三聯式', '電子發票', '收銀機發票', '電算機發票'];  // 憑證類別選項

// ===== 登入 / 登出 =====
async function googleLogin() {
    try {
        const provider = new firebase.auth.GoogleAuthProvider();
        await auth.signInWithPopup(provider);
    } catch (e) {
        document.getElementById('loginError').textContent = '登入失敗：' + e.message;
        document.getElementById('loginError').classList.remove('hidden');
    }
}

function logout() {
    auth.signOut();
}

// 監聽登入狀態
auth.onAuthStateChanged(async (user) => {
    if (user) {
        // 檢查白名單
        const allowed = await checkWhitelist(user.email);
        if (!allowed) {
            document.getElementById('loginError').textContent = '您的帳號不在白名單中，請聯繫管理員';
            document.getElementById('loginError').classList.remove('hidden');
            auth.signOut();
            return;
        }
        currentUser = user;
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('mainScreen').classList.remove('hidden');
        document.getElementById('userEmail').textContent = user.email;

        // 檢查是否為管理員
        isAdmin = await checkAdmin(user.email);
        if (isAdmin) {
            document.getElementById('tabAdmin').classList.remove('hidden');
            loadAdminData();
        }

        // 取得 API Key
        await loadApiKey();
        // 載入歷史紀錄
        loadHistory();
    } else {
        currentUser = null;
        isAdmin = false;
        document.getElementById('loginScreen').classList.remove('hidden');
        document.getElementById('mainScreen').classList.add('hidden');
    }
});

// 檢查白名單
async function checkWhitelist(email) {
    try {
        const doc = await db.collection('invoice-whitelist').doc(email).get();
        return doc.exists;
    } catch (e) {
        console.error('白名單查詢失敗:', e);
        return false;
    }
}

// 檢查管理員
async function checkAdmin(email) {
    try {
        const doc = await db.collection('invoice-admins').doc(email).get();
        return doc.exists;
    } catch (e) {
        return false;
    }
}

// 取得 API Key
async function loadApiKey() {
    try {
        const doc = await db.collection('invoice-config').doc('settings').get();
        if (doc.exists && doc.data().anthropicApiKey) {
            anthropicApiKey = doc.data().anthropicApiKey;
        }
    } catch (e) {
        console.error('API Key 載入失敗:', e);
    }
}

// ===== 分頁切換 =====
function switchTab(tab) {
    ['Upload', 'History', 'Admin'].forEach(t => {
        document.getElementById('page' + t).classList.add('hidden');
        document.getElementById('tab' + t).classList.remove('active');
    });
    document.getElementById('page' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.remove('hidden');
    document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
}

// ===== 科目分類管理 =====
function loadCategoryOptions() {
    try {
        const saved = JSON.parse(localStorage.getItem('invoice_categories') || '[]');
        if (saved.length > 0) categoryOptions = saved;
    } catch {}
    renderCategoryDatalist();
}

function saveCategoryOption(value) {
    if (!value || categoryOptions.includes(value)) return;
    categoryOptions.push(value);
    localStorage.setItem('invoice_categories', JSON.stringify(categoryOptions));
    renderCategoryDatalist();
}

function renderCategoryDatalist() {
    let dl = document.getElementById('categoryList');
    if (!dl) {
        dl = document.createElement('datalist');
        dl.id = 'categoryList';
        document.body.appendChild(dl);
    }
    dl.innerHTML = categoryOptions.map(c => `<option value="${c}">`).join('');
}

// ===== 憑證類別管理 =====
function loadCertTypeOptions() {
    try {
        const saved = JSON.parse(localStorage.getItem('invoice_cert_types') || '[]');
        if (saved.length > 0) certTypeOptions = saved;
    } catch {}
    renderCertTypeDatalist();
}

function saveCertTypeOption(value) {
    if (!value || certTypeOptions.includes(value)) return;
    certTypeOptions.push(value);
    localStorage.setItem('invoice_cert_types', JSON.stringify(certTypeOptions));
    renderCertTypeDatalist();
}

function renderCertTypeDatalist() {
    let dl = document.getElementById('certTypeList');
    if (!dl) {
        dl = document.createElement('datalist');
        dl.id = 'certTypeList';
        document.body.appendChild(dl);
    }
    dl.innerHTML = certTypeOptions.map(c => `<option value="${c}">`).join('');
}

loadCategoryOptions();
loadCertTypeOptions();

// ===== 上傳欄位管理 =====
function addUploadSlot() {
    const id = slotCounter++;
    uploadSlots.push({ id, dataUrl: null, name: '', status: 'empty' });
    renderUploadSlots();
}

function removeSlot(id) {
    uploadSlots = uploadSlots.filter(s => s.id !== id);
    if (uploadSlots.length === 0) addUploadSlot();
    renderUploadSlots();
}

function clearAllSlots() {
    uploadSlots = [{ id: slotCounter++, dataUrl: null, name: '', status: 'empty' }];
    renderUploadSlots();
}

function handleSlotFile(input, slotId) {
    const file = input.files[0];
    if (!file || !file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        const slot = uploadSlots.find(s => s.id === slotId);
        if (slot) {
            slot.dataUrl = e.target.result;
            slot.name = file.name;
            slot.status = 'ready';
        }
        renderUploadSlots();
    };
    reader.readAsDataURL(file);
}

function handleSlotDrop(e, slotId) {
    e.preventDefault();
    e.currentTarget.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (!file || !file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
        const slot = uploadSlots.find(s => s.id === slotId);
        if (slot) {
            slot.dataUrl = ev.target.result;
            slot.name = file.name;
            slot.status = 'ready';
        }
        renderUploadSlots();
    };
    reader.readAsDataURL(file);
}

function renderUploadSlots() {
    const container = document.getElementById('uploadSlotsContainer');
    container.innerHTML = uploadSlots.map(slot => `
        <div class="upload-slot invoice-card p-4 flex items-center gap-4 fade-in" data-slot="${slot.id}">
            ${slot.dataUrl
                ? `<img src="${slot.dataUrl}" class="w-24 h-24 object-cover rounded-lg border" alt="發票照片">
                   <div class="flex-1">
                       <p class="font-semibold text-sm">${slot.name}</p>
                       <span class="status-badge status-${slot.status}">
                           ${slot.status === 'ready' ? '✅ 已上傳' : slot.status === 'processing' ? '<span class="spinner"></span> 辨識中...' : slot.status === 'done' ? '✅ 完成' : slot.status === 'error' ? '❌ 失敗' : ''}
                       </span>
                       ${slot.error ? `<p class="text-xs text-red-500 mt-1">${slot.error}</p>` : ''}
                   </div>`
                : `<div class="upload-zone rounded-lg p-6 text-center cursor-pointer flex-1"
                       onclick="this.querySelector('input').click()"
                       ondragover="event.preventDefault(); this.classList.add('dragover')"
                       ondragleave="this.classList.remove('dragover')"
                       ondrop="handleSlotDrop(event, ${slot.id})">
                       <input type="file" accept="image/*" class="hidden" onchange="handleSlotFile(this, ${slot.id})">
                       <div class="text-3xl">📸</div>
                       <p class="text-sm text-gray-500 mt-1">點擊或拖曳上傳發票照片</p>
                   </div>`
            }
            <button onclick="removeSlot(${slot.id})" class="text-gray-400 hover:text-red-500 text-xl" title="移除">&times;</button>
        </div>
    `).join('');
}

// ===== AI 辨識 =====
async function recognizeAll() {
    if (!anthropicApiKey) {
        alert('尚未設定 API Key，請聯繫管理員');
        return;
    }

    const ready = uploadSlots.filter(s => s.status === 'ready');
    if (ready.length === 0) {
        alert('請先上傳發票照片');
        return;
    }

    document.getElementById('btnRecognize').disabled = true;
    document.getElementById('btnRecognize').innerHTML = '<span class="spinner"></span> 辨識中...';

    for (let i = 0; i < ready.length; i++) {
        const slot = ready[i];
        // 多張時每張間隔 2 秒，避免 API 過載
        if (i > 0) await new Promise(r => setTimeout(r, 2000));
        slot.status = 'processing';
        renderUploadSlots();

        try {
            const results = await callClaudeVisionWithRetry(slot.dataUrl);
            slot.status = 'done';

            // 將結果加入表格
            results.forEach(r => {
                resultRows.push({ ...r, sourceImage: slot.name, id: 'row_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5) });
            });

            renderResultTable();
        } catch (e) {
            slot.status = 'error';
            slot.error = e.message;
        }
        renderUploadSlots();
    }

    document.getElementById('btnRecognize').disabled = false;
    document.getElementById('btnRecognize').innerHTML = '🤖 開始辨識全部';
}

// 含重試的 API 呼叫（最多 3 次，每次間隔遞增）
async function callClaudeVisionWithRetry(dataUrl, maxRetries = 3) {
    for (let attempt = 1; attempt <= maxRetries; attempt++) {
        try {
            return await callClaudeVision(dataUrl);
        } catch (e) {
            const isOverloaded = e.message.includes('verloaded') || e.message.includes('529') || e.message.includes('rate');
            if (isOverloaded && attempt < maxRetries) {
                await new Promise(r => setTimeout(r, attempt * 3000));
                continue;
            }
            throw e;
        }
    }
}

// 呼叫 Claude Vision API
async function callClaudeVision(dataUrl) {
    // 從 dataUrl 取得 base64 和 media type
    const match = dataUrl.match(/^data:(image\/[a-z]+);base64,(.+)$/);
    if (!match) throw new Error('圖片格式錯誤');
    const mediaType = match[1];
    const base64Data = match[2];

    const prompt = `你是一個台灣發票辨識專家。請仔細辨識這張照片中的所有發票（可能有多張），並回傳 JSON 陣列。

每張發票請提取以下欄位：
- invoice_number: 發票號碼（格式為 2個英文字母 + 8個數字，例如 WY42845223 或 ZF78255399）。發票號碼通常出現在「發票號碼：」後面，或是發票上方明顯位置。有些電子發票證明聯的發票號碼會寫成「發票號碼：XX12345678」的格式，請務必完整讀取。
- invoice_date: 發票日期（格式：民國年 YYY/MM/DD，例如 115/03/25）。如果發票上是西元年份，請轉換為民國年（西元年 - 1911 = 民國年，例如 2026 → 115）。如果發票上已經是民國年，直接使用。
- amount: 進項金額（未稅銷售額，數字。請找「銷售額」或「未稅」欄位，不要讀取商品數量或單價）
- tax: 進項稅額（稅額，數字。請找「稅額」或「營業稅」欄位）
- total: 進項總額（含稅總金額，數字。請找「總計」或「合計」或發票最上方的「總計」數字）
- seller_tax_id: 銷售方統編（⚠️ 必須是「賣方」的統一編號，8位數字。絕對不要填左上方「買方」的統編 53613149，那是我方的統編。要找的是發票右下角「賣　方：」後面的統編。）
- certificate_type: 憑證類別（例如：三聯式、電子發票、收銀機發票、電算機發票）
- seller_name: 賣方名稱（發票右下角「賣　方：」後面的公司名稱，不是發票最上方的公司名）

⚠️ 重要注意事項：
1. 金額辨識最重要：請找「銷售額」「稅額」「總計」這三個關鍵字對應的數字，不要把商品的數量、單價、公升數當成發票金額
2. 統編辨識（最容易出錯，請特別注意）：
   - 「電子發票證明聯」的版面配置：左上方「買　方：」+ 統編是購買方（我方），右下方「賣　方：」+ 統編才是銷售方。
   - 買方統編 53613149 是我方公司，如果你讀到這個統編就代表你讀錯了！請去右下角找「賣　方：」旁邊的統編。
   - seller_name 也是右下角「賣　方：」後面的公司名，不是發票最上方印的公司名（最上方的公司名和右下角的賣方名稱通常是同一家，但請以右下角為準）。
3. 如果照片中有多張發票，請都辨識出來
4. 如果某個欄位看不清楚，填入空字串 ""
5. 金額一律為整數數字，不含逗號和幣別符號
6. 西元年份請轉換為民國年份（西元年 - 1911 = 民國年，例如 2026 → 115）
7. 進項總額 = 進項金額 + 進項稅額，如果只有總額沒有分開，請自行計算（金額 = Math.round(總額 / 1.05)，稅額 = 總額 - 金額）

請只回傳 JSON 陣列，不要有其他文字。範例格式：
[
  {
    "invoice_number": "WM-11868115",
    "invoice_date": "115/02/09",
    "amount": 1515,
    "tax": 76,
    "total": 1591,
    "seller_tax_id": "02980748",
    "certificate_type": "電子發票",
    "seller_name": "台灣中油"
  }
]`;

    const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'x-api-key': anthropicApiKey,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 4096,
            messages: [{
                role: 'user',
                content: [
                    {
                        type: 'image',
                        source: { type: 'base64', media_type: mediaType, data: base64Data }
                    },
                    { type: 'text', text: prompt }
                ]
            }]
        })
    });

    if (!response.ok) {
        const errData = await response.json().catch(() => ({}));
        throw new Error(errData.error?.message || `API 錯誤 (${response.status})`);
    }

    const data = await response.json();
    const text = data.content[0].text;

    // 解析 JSON（支援被 markdown 包裹的情況）
    let jsonStr = text;
    const jsonMatch = text.match(/```(?:json)?\s*([\s\S]*?)```/);
    if (jsonMatch) jsonStr = jsonMatch[1];

    try {
        const parsed = JSON.parse(jsonStr.trim());
        const arr = Array.isArray(parsed) ? parsed : [parsed];

        return arr.map(inv => ({
            category: '',  // 科目分類由使用者手動選擇
            certificateType: inv.certificate_type || '電子發票',
            invoiceDate: inv.invoice_date || '',
            amount: inv.amount || 0,
            tax: inv.tax || 0,
            total: inv.total || 0,
            invoiceNumber: (inv.invoice_number || '').replace(/-/g, ''),
            sellerTaxId: inv.seller_tax_id || '',
            sellerName: inv.seller_name || ''
        }));
    } catch (e) {
        throw new Error('AI 回傳格式解析失敗');
    }
}

// ===== 結果表格 =====
function renderResultTable() {
    if (resultRows.length === 0) {
        document.getElementById('resultSection').classList.add('hidden');
        return;
    }
    document.getElementById('resultSection').classList.remove('hidden');

    const tbody = document.getElementById('resultBody');
    tbody.innerHTML = resultRows.map((row, idx) => `
        <tr class="fade-in" data-idx="${idx}">
            <td><input type="checkbox" class="row-check" data-idx="${idx}"></td>
            <td>
                <div style="position:relative">
                    <input type="text" list="categoryList" value="${row.category}"
                        onchange="updateRow(${idx}, 'category', this.value); saveCategoryOption(this.value)"
                        placeholder="輸入或選擇" style="width:100px">
                </div>
            </td>
            <td>
                <input type="text" list="certTypeList" value="${row.certificateType}"
                    onchange="updateRow(${idx}, 'certificateType', this.value); saveCertTypeOption(this.value)"
                    placeholder="輸入或選擇" style="width:120px">
            </td>
            <td><input type="text" value="${row.invoiceDate}" onchange="updateRow(${idx}, 'invoiceDate', this.value)" placeholder="YYY/MM/DD"></td>
            <td><input type="number" value="${row.amount}" onchange="updateRow(${idx}, 'amount', parseFloat(this.value)||0)" style="width:100px"></td>
            <td><input type="number" value="${row.tax}" onchange="updateRow(${idx}, 'tax', parseFloat(this.value)||0)" style="width:100px"></td>
            <td><input type="number" value="${row.total}" onchange="updateRow(${idx}, 'total', parseFloat(this.value)||0)" style="width:100px"></td>
            <td><input type="text" value="${row.invoiceNumber}" onchange="updateRow(${idx}, 'invoiceNumber', this.value)" style="width:140px"></td>
            <td><input type="text" value="${row.sellerTaxId}${row.sellerName ? row.sellerName : ''}" onchange="updateSellerField(${idx}, this.value)" style="width:180px"></td>
            <td>
                <button onclick="deleteRow(${idx})" class="text-red-400 hover:text-red-600 text-lg" title="刪除">&times;</button>
            </td>
        </tr>
    `).join('');
}

function updateRow(idx, field, value) {
    resultRows[idx][field] = value;
}

// 解析「統編+賣方名稱」欄位，前8碼為統編，後面為名稱
function updateSellerField(idx, value) {
    const taxId = value.replace(/[^0-9A-Za-z\u4e00-\u9fff]/g, '').substring(0, 8).replace(/[^\d]/g, '') || value.substring(0, 8);
    const match = value.match(/^(\d{8})(.*)/);
    if (match) {
        resultRows[idx].sellerTaxId = match[1];
        resultRows[idx].sellerName = match[2];
    } else {
        resultRows[idx].sellerTaxId = value;
        resultRows[idx].sellerName = '';
    }
}

function deleteRow(idx) {
    resultRows.splice(idx, 1);
    renderResultTable();
}

function addEmptyRow() {
    resultRows.push({
        category: '', certificateType: '三聯式', invoiceDate: '',
        amount: 0, tax: 0, total: 0, invoiceNumber: '', sellerTaxId: '', sellerName: '',
        id: 'row_' + Date.now()
    });
    renderResultTable();
}

function toggleCheckAll(el) {
    document.querySelectorAll('.row-check').forEach(cb => cb.checked = el.checked);
}

// ===== XLS 匯出 =====
function exportXLS() {
    if (resultRows.length === 0) {
        alert('沒有可匯出的資料');
        return;
    }

    // 依照匯出格式建立資料
    const exportData = [
        ['進項', '', '', '', '', '', '', ''],
        ['科目分類', '憑證類別', '發票日期', '進項金額', '進項稅額', '進項總額', '發票號碼', '銷售方統編']
    ];

    resultRows.forEach(row => {
        exportData.push([
            row.category,
            row.certificateType,
            row.invoiceDate,
            row.amount,
            row.tax,
            row.total,
            row.invoiceNumber,
            row.sellerTaxId + (row.sellerName || '')
        ]);
    });

    // 建立 Excel
    const ws = XLSX.utils.aoa_to_sheet(exportData);

    // 設定欄寬
    ws['!cols'] = [
        { wch: 10 }, { wch: 18 }, { wch: 12 }, { wch: 12 },
        { wch: 12 }, { wch: 12 }, { wch: 16 }, { wch: 12 }
    ];

    // 合併第一行標題
    ws['!merges'] = [{ s: { r: 0, c: 0 }, e: { r: 0, c: 7 } }];

    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, '工作表1');

    // 檔名加日期
    const today = new Date();
    const dateStr = `${today.getFullYear()}${String(today.getMonth()+1).padStart(2,'0')}${String(today.getDate()).padStart(2,'0')}`;
    XLSX.writeFile(wb, `進項發票_${dateStr}.xls`);

    // 儲存到歷史紀錄
    saveToHistory(resultRows);
}

// ===== 歷史紀錄 =====
function saveToHistory(rows) {
    const record = {
        date: new Date().toLocaleString('zh-TW'),
        count: rows.length,
        rows: rows.map(r => ({...r})),
        user: currentUser?.email || ''
    };
    historyData.unshift(record);
    if (historyData.length > 50) historyData.pop();
    localStorage.setItem('invoice_history', JSON.stringify(historyData));
    renderHistory();
}

function loadHistory() {
    try {
        historyData = JSON.parse(localStorage.getItem('invoice_history') || '[]');
    } catch { historyData = []; }
    renderHistory();
}

function renderHistory() {
    const container = document.getElementById('historyList');
    if (historyData.length === 0) {
        container.innerHTML = '<p class="text-gray-400 text-center py-10">尚無辨識紀錄</p>';
        return;
    }
    container.innerHTML = historyData.map((h, idx) => `
        <div class="invoice-card p-4 flex items-center justify-between">
            <div>
                <p class="font-semibold">${h.date}</p>
                <p class="text-sm text-gray-500">${h.count} 筆發票 ｜ ${h.user}</p>
            </div>
            <div class="flex gap-2">
                <button onclick="reloadHistory(${idx})" class="brand-btn px-3 py-1 rounded text-sm">載入</button>
                <button onclick="reExportHistory(${idx})" class="brand-btn-orange px-3 py-1 rounded text-sm">匯出</button>
            </div>
        </div>
    `).join('');
}

function reloadHistory(idx) {
    resultRows = historyData[idx].rows.map(r => ({...r}));
    switchTab('upload');
    renderResultTable();
}

function reExportHistory(idx) {
    const rows = historyData[idx].rows;
    resultRows = rows.map(r => ({...r}));
    exportXLS();
}

function clearHistory() {
    if (!confirm('確定要清除全部辨識紀錄？')) return;
    historyData = [];
    localStorage.removeItem('invoice_history');
    renderHistory();
}

// ===== 管理面板 =====
async function loadAdminData() {
    // 載入 API Key 狀態
    try {
        const doc = await db.collection('invoice-config').doc('settings').get();
        if (doc.exists && doc.data().anthropicApiKey) {
            const key = doc.data().anthropicApiKey;
            document.getElementById('apiKeyInput').value = key;
            document.getElementById('apiKeyStatus').textContent = '✅ 已設定 API Key';
            document.getElementById('apiKeyStatus').className = 'text-xs text-green-600 mt-2';
        } else {
            document.getElementById('apiKeyStatus').textContent = '⚠️ 尚未設定 API Key';
            document.getElementById('apiKeyStatus').className = 'text-xs text-orange-600 mt-2';
        }
    } catch (e) { /* ignore */ }

    // 載入白名單
    loadWhitelist();
    // 載入管理員名單
    loadAdminList();
}

async function saveApiKey() {
    const key = document.getElementById('apiKeyInput').value.trim();
    if (!key) { alert('請輸入 API Key'); return; }
    try {
        await db.collection('invoice-config').doc('settings').set({ anthropicApiKey: key }, { merge: true });
        anthropicApiKey = key;
        document.getElementById('apiKeyStatus').textContent = '✅ API Key 已儲存';
        document.getElementById('apiKeyStatus').className = 'text-xs text-green-600 mt-2';
    } catch (e) {
        alert('儲存失敗：' + e.message);
    }
}

async function loadWhitelist() {
    const container = document.getElementById('whitelistList');
    try {
        const snap = await db.collection('invoice-whitelist').get();
        if (snap.empty) {
            container.innerHTML = '<p class="text-sm text-gray-400">尚無白名單</p>';
            return;
        }
        container.innerHTML = snap.docs.map(doc => `
            <div class="flex items-center justify-between bg-white rounded-lg p-2 px-3">
                <span class="text-sm">${doc.id}</span>
                <button onclick="removeWhitelist('${doc.id}')" class="text-red-400 hover:text-red-600 text-sm">移除</button>
            </div>
        `).join('');
    } catch (e) {
        container.innerHTML = '<p class="text-sm text-red-500">載入失敗</p>';
    }
}

async function addWhitelist() {
    const email = document.getElementById('whitelistInput').value.trim().toLowerCase();
    if (!email || !email.includes('@')) { alert('請輸入有效的 Email'); return; }
    try {
        await db.collection('invoice-whitelist').doc(email).set({ addedBy: currentUser.email, addedAt: new Date() });
        document.getElementById('whitelistInput').value = '';
        loadWhitelist();
    } catch (e) { alert('新增失敗：' + e.message); }
}

async function removeWhitelist(email) {
    if (!confirm(`確定要移除 ${email}？`)) return;
    try {
        await db.collection('invoice-whitelist').doc(email).delete();
        loadWhitelist();
    } catch (e) { alert('移除失敗：' + e.message); }
}

async function loadAdminList() {
    const container = document.getElementById('adminList');
    try {
        const snap = await db.collection('invoice-admins').get();
        if (snap.empty) {
            container.innerHTML = '<p class="text-sm text-gray-400">尚無管理員</p>';
            return;
        }
        container.innerHTML = snap.docs.map(doc => `
            <div class="flex items-center justify-between bg-white rounded-lg p-2 px-3">
                <span class="text-sm">${doc.id}</span>
                <button onclick="removeAdmin('${doc.id}')" class="text-red-400 hover:text-red-600 text-sm">移除</button>
            </div>
        `).join('');
    } catch (e) {
        container.innerHTML = '<p class="text-sm text-red-500">載入失敗</p>';
    }
}

async function addAdmin() {
    const email = document.getElementById('adminInput').value.trim().toLowerCase();
    if (!email || !email.includes('@')) { alert('請輸入有效的 Email'); return; }
    try {
        await db.collection('invoice-admins').doc(email).set({ addedBy: currentUser.email, addedAt: new Date() });
        // 同時加入白名單
        await db.collection('invoice-whitelist').doc(email).set({ addedBy: currentUser.email, addedAt: new Date() });
        document.getElementById('adminInput').value = '';
        loadAdminList();
        loadWhitelist();
    } catch (e) { alert('新增失敗：' + e.message); }
}

async function removeAdmin(email) {
    if (email === currentUser.email) { alert('不能移除自己的管理員權限'); return; }
    if (!confirm(`確定要移除管理員 ${email}？`)) return;
    try {
        await db.collection('invoice-admins').doc(email).delete();
        loadAdminList();
    } catch (e) { alert('移除失敗：' + e.message); }
}
